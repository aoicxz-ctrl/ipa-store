<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<style>
    body { background-color: #0b1120; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
    
    /* العنوان العلوي */
    .header { text-align: center; font-size: 22px; font-weight: bold; margin-bottom: 20px; }
    
    /* قائمة التطبيقات */
    .app-card { 
        background-color: #1e293b; 
        padding: 15px; 
        border-radius: 20px; 
        display: flex; 
        align-items: center; 
        justify-content: space-between; 
        margin-bottom: 12px;
        border: 1px solid #334155;
    }
    .app-info { display: flex; align-items: center; gap: 15px; }
    .app-icon { width: 50px; height: 50px; background-color: #334155; border-radius: 12px; }
    .download-btn { background-color: #334155; border: none; color: white; padding: 8px 20px; border-radius: 15px; cursor: pointer; }
    
    /* الشريط السفلي */
    .nav-bar { 
        position: fixed; bottom: 0; left: 0; right: 0; 
        background: #1e293b; padding: 15px; display: flex; 
        justify-content: space-around; border-top-left-radius: 20px; border-top-right-radius: 20px; 
    }
</style>
</head>
<body>

<div class="header">تطبيقات IPA</div>

<div class="app-card">
    <div class="app-info">
        <div class="app-icon"></div>
        <div>
            <div style="font-weight: bold;">Instagram Rocket</div>
            <div style="font-size: 12px; color: #94a3b8;">تواصل اجتماعي</div>
        </div>
    </div>
    <button class="download-btn">تنزيل</button>
</div>

<div class="app-card">
    <div class="app-info">
        <div class="app-icon"></div>
        <div>
            <div style="font-weight: bold;">WPS Office</div>
            <div style="font-size: 12px; color: #94a3b8;">إنتاجية</div>
        </div>
    </div>
    <button class="download-btn">تنزيل</button>
</div>

<div class="nav-bar">
    <div>الرئيسية</div>
    <div>التطبيقات</div>
    <div>المصادر</div>
    <div>انستا</div>
</div>

</body>
</html>
