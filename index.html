<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<style>
    body { font-family: sans-serif; background-color: #0f172a; color: white; padding: 20px; }
    .header { font-size: 24px; font-weight: bold; margin-bottom: 20px; }
    .app-card { background-color: #1e293b; padding: 15px; border-radius: 15px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .app-info { display: flex; align-items: center; gap: 15px; }
    .app-icon { width: 50px; height: 50px; background-color: #334155; border-radius: 12px; }
    .download-btn { background-color: #334155; padding: 8px 20px; border-radius: 20px; cursor: pointer; border: none; color: white; }
</style>
</head>
<body>

<div class="header">تطبيقات IPA</div>

<div class="app-card">
    <div class="app-info">
        <div class="app-icon"></div>
        <div>
            <div>اسم التطبيق</div>
            <div style="color: #94a3b8; font-size: 12px;">AppTesters IPA Repo</div>
        </div>
    </div>
    <button class="download-btn">تنزيل</button>
</div>

</body>
</html>
