<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>متجر تطبيقاتي</title>
    <style>
        body {
            background: #0a0a0a;
            color: white;
            font-family: Arial;
            padding: 20px;
        }
        .app-card {
            background: #1e1e1e;
            padding: 15px;
            margin: 10px;
            border-radius: 15px;
            display: inline-block;
            width: 150px;
            text-align: center;
            cursor: pointer;
        }
        .search {
            width: 90%;
            padding: 10px;
            margin: 20px;
            border-radius: 25px;
            border: none;
        }
    </style>
</head>
<body>

<center>
    <h1>📱 متجر IPA</h1>
    <input type="text" id="search" class="search" placeholder="🔍 بحث..." onkeyup="searchApps()">
    <div id="appsList"></div>
</center>

<script>
    const apps = [
        { name: "WhatsApp Gold", link: "#", icon: "💛" },
        { name: "Telegram Dark", link: "#", icon: "🌙" },
        { name: "Instagram DL", link: "#", icon: "📸" }
    ];

    function showApps(list) {
        let html = "";
        for(let app of list) {
            html += `<div class="app-card" onclick="window.open('${app.link}','_blank')">
                        <div style="font-size:40px">${app.icon}</div>
                        <div>${app.name}</div>
                    </div>`;
        }
        document.getElementById("appsList").innerHTML = html;
    }

    function searchApps() {
        let searchWord = document.getElementById("search").value.toLowerCase();
        let filtered = apps.filter(app => app.name.toLowerCase().includes(searchWord));
        showApps(filtered);
    }

    showApps(apps);
</script>

</body>
</html>
