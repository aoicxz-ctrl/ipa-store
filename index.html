<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ستور التطبيقات</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Tajawal',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{

background:
radial-gradient(circle at top right,#003cff 0%,transparent 35%),
radial-gradient(circle at bottom left,#6a00ff 0%,transparent 35%),
#000;

min-height:100vh;
overflow-x:hidden;
padding:20px;
color:#fff;

}

/* الخلفية */

body::before{

content:'';

position:fixed;
inset:0;

backdrop-filter:blur(120px);

z-index:-1;

}

/* الأعلى */

.top{

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:30px;

}

/* الشعار */

.logo{

font-size:30px;
font-weight:800;

text-shadow:0 0 25px rgba(0,153,255,.4);

}

/* الأزرار */

.glass{

width:58px;
height:58px;

border-radius:22px;

display:flex;
justify-content:center;
align-items:center;

font-size:24px;

background:rgba(255,255,255,.06);

backdrop-filter:blur(25px) saturate(180%);
-webkit-backdrop-filter:blur(25px) saturate(180%);

border:1px solid rgba(255,255,255,.08);

box-shadow:
0 8px 30px rgba(0,0,0,.35),
inset 0 1px 1px rgba(255,255,255,.12);

}

/* البحث */

.search{

width:100%;
height:58px;

border:none;
outline:none;

padding:0 20px;

font-size:16px;
color:#fff;

border-radius:24px;

margin-bottom:28px;

background:rgba(255,255,255,.06);

backdrop-filter:blur(25px);
-webkit-backdrop-filter:blur(25px);

border:1px solid rgba(255,255,255,.08);

}

.search::placeholder{

color:#94a3b8;

}

/* البنر */

.banner{

padding:30px;

border-radius:32px;

margin-bottom:35px;

background:rgba(255,255,255,.06);

backdrop-filter:blur(30px) saturate(180%);
-webkit-backdrop-filter:blur(30px) saturate(180%);

border:1px solid rgba(255,255,255,.08);

box-shadow:
0 8px 32px rgba(0,0,0,.35);

position:relative;
overflow:hidden;

}

.banner::before{

content:'';

position:absolute;

width:220px;
height:220px;

background:#0066ff;

border-radius:50%;

filter:blur(100px);

top:-80px;
left:-80px;

opacity:.5;

}

/* عنوان البنر */

.banner h1{

font-size:34px;
line-height:1.3;

margin-bottom:15px;

position:relative;
z-index:2;

}

/* وصف البنر */

.banner p{

font-size:18px;
line-height:1.8;

color:#dbe4ff;

position:relative;
z-index:2;

}

/* زر التلي */

.telegram{

display:inline-block;

margin-top:22px;

padding:14px 22px;

border-radius:18px;

text-decoration:none;

font-size:16px;
font-weight:700;

color:#fff;

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.08);

position:relative;
z-index:2;

}

/* عنوان القسم */

.section{

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:22px;

}

.section h2{

font-size:28px;
font-weight:800;

}

/* العدد */

.count{

padding:8px 15px;

border-radius:16px;

font-size:15px;

background:rgba(255,255,255,.06);

backdrop-filter:blur(20px);

}

/* التطبيقات */

.apps{

display:flex;
flex-direction:column;
gap:18px;

}

/* الكارت */

.card{

display:flex;
justify-content:space-between;
align-items:center;

padding:15px;

border-radius:28px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(30px);
-webkit-backdrop-filter:blur(30px);

border:1px solid rgba(255,255,255,.08);

box-shadow:
0 8px 32px rgba(0,0,0,.35);

}

/* اليمين */

.right{

display:flex;
align-items:center;
gap:16px;

}

/* صورة التطبيق */

.right img{

width:72px;
height:72px;

border-radius:22px;

object-fit:cover;

}

/* الاسم */

.info h3{

font-size:22px;

margin-bottom:4px;

}

/* الوصف */

.info p{

font-size:15px;

color:#b8c2d9;

}

/* زر التنزيل */

.install{

padding:12px 20px;

border-radius:18px;

text-decoration:none;

font-size:15px;
font-weight:700;

color:#fff;

background:
linear-gradient(135deg,#0084ff,#005dff);

box-shadow:
0 8px 25px rgba(0,102,255,.45);

}

/* النافبار */

.nav{

position:fixed;

bottom:20px;
left:50%;

transform:translateX(-50%);

width:90%;
height:78px;

border-radius:30px;

display:flex;
justify-content:space-around;
align-items:center;

background:rgba(255,255,255,.06);

backdrop-filter:blur(30px);
-webkit-backdrop-filter:blur(30px);

border:1px solid rgba(255,255,255,.08);

box-shadow:
0 8px 32px rgba(0,0,0,.35);

}

/* العناصر */

.item{

display:flex;
flex-direction:column;
align-items:center;

gap:4px;

font-size:13px;

color:#94a3b8;

}

/* النشط */

.active{

color:#1d9cff;

}

</style>

</head>

<body>

<!-- الأعلى -->

<div class="top">

<div class="glass">⚙️</div>

<div class="logo">
ستور التطبيقات
</div>

<div class="glass">☰</div>

</div>

<!-- البحث -->

<input type="text" class="search" placeholder="ابحث عن تطبيق...">

<!-- البنر -->

<div class="banner">

<h1>
أحدث التطبيقات والتحديثات
</h1>

<p>
تابع آخر التطبيقات المعدلة والجديدة داخل ستور التطبيقات
</p>

<a href="https://t.me/R8RIJ" class="telegram">
قناة التليجرام
</a>

</div>

<!-- القسم -->

<div class="section">

<h2>
محدث مؤخراً
</h2>

<div class="count">
249
</div>

</div>

<!-- التطبيقات -->

<div class="apps">

<div class="card">

<div class="right">

<img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png">

<div class="info">

<h3>
Instagram Rocket
</h3>

<p>
تواصل اجتماعي • v430.0
</p>

</div>

</div>

<a href="#" class="install">
تنزيل
</a>

</div>

<div class="card">

<div class="right">

<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">

<div class="info">

<h3>
Reddit Deluxe
</h3>

<p>
تطبيق اجتماعي • v2026.19
</p>

</div>

</div>

<a href="#" class="install">
تنزيل
</a>

</div>

</div>

<!-- النافبار -->

<div class="nav">

<div class="item active">
🏠
<span>الرئيسية</span>
</div>

<div class="item">
📦
<span>التطبيقات</span>
</div>

<div class="item">
📚
<span>المصادر</span>
</div>

<div class="item">
📷
<span>انستا</span>
</div>

</div>

</body>
</html>
