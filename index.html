<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<style>
    body { background-color: #0b1120; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
    .header { font-size: 24px; font-weight: bold; margin: 20px 0; }
    
    /* تصنيف التطبيقات */
    .section-title { font-size: 18px; margin: 20px 0; }
    .apps-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
    .app-item { background: #1e293b; padding: 15px; border-radius: 20px; text-align: center; }
    .app-icon { width: 60px; height: 60px; background: #334155; border-radius: 15px; margin: 0 auto 10px; }
    .download-btn { background: #334155; color: white; border: none; padding: 5px 15px; border-radius: 15px; margin-top: 10px; cursor: pointer; }
    
    /* شريط التنقل السفلي */
    .navbar { position: fixed; bottom: 10px; left: 10px; right: 10px; background: #1e293b; padding: 15px; border-radius: 30px; display: flex; justify-content: space-around; }
</style>
</head>
<body>

<div class="header">تطبيقات IPA</div>

<div class="section-title">تواصل اجتماعي</div>
<div class="apps-grid">
    <div class="app-item">
        <div class="app-icon"></div>
        <div>Regram</div>
        <button class="download-btn">تنزيل</button>
    </div>
    <div class="app-item">
        <div class="app-icon"></div>
        <div>WhatsApp</div>
        <button class="download-btn">تنزيل</button>
    </div>
    <div class="app-item">
        <div class="app-icon"></div>
        <div>Beegram</div>
        <button class="download-btn">تنزيل</button>
    </div>
</div>

<div class="navbar">
    <div>الإعدادات</div>
    <div>التنزيلات</div>
    <div>التوقيع</div>
    <div>التطبيقات</div>
    <div>الرئيسية</div>
</div>

</body>
</html>
