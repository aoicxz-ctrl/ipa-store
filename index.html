<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>IPA Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* إعدادات الزجاج البلوري السائل */
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(25px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: #05070f;
            color: #ffffff;
            padding-top: 75px;
            padding-bottom: 110px;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* تأثير فقاعات السائل الملونة التي تسبح خلف الزجاج */
        body::before, body::after {
            content: "";
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.4;
            pointer-events: none;
        }
        body::before {
            top: -50px;
            left: -50px;
            background: linear-gradient(45deg, #1e40af, #3b82f6);
        }
        body::after {
            bottom: 50px;
            right: -50px;
            background: linear-gradient(45deg, #6d28d9, #a855f7);
        }

        /* الهيدر العلوي الزجاجي الشفاف */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(5, 7, 15, 0.4);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
        }

        /* الاسم الجديد المعدل بـ خط أصغر وأنيق */
        .header .logo {
            font-size: 19px;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(to left, #ffffff, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header .top-icon {
            width: 38px;
            height: 38px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
        }

        /* شريط التصنيفات الدائري */
        .categories-wrapper {
            overflow-x: auto;
            white-space: nowrap;
            padding: 10px 15px;
            margin-bottom: 15px;
        }
        .categories-wrapper::-webkit-scrollbar { display: none; }

        .category-item {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            margin-left: 20px;
            cursor: pointer;
        }

        .category-icon-circle {
            width: 60px;
            height: 60px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #ffffff;
            margin-bottom: 6px;
            transition: all 0.2s ease;
        }

        .category-item:active .category-icon-circle,
        .category-item.active .category-icon-circle {
            background: #ffffff;
            color: #05070f;
            transform: scale(0.95);
        }

        /* خط أسماء التصنيفات أصغر */
        .category-name {
            font-size: 11px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
        }
        .category-item.active .category-name {
            color: #ffffff;
        }

        /* أقسام المحتوى */
        .section-container {
            margin-bottom: 25px;
        }

        /* خط عناوين الأقسام أصغر وأنعم */
        .section-header {
            font-size: 17px;
            font-weight: 700;
            padding: 0 20px;
            margin-bottom: 12px;
            color: rgba(255, 255, 255, 0.9);
        }

        /* سكرول التطبيقات */
        .apps-scroller {
            display: flex;
            overflow-x: auto;
            padding: 5px 20px 15px 20px;
            gap: 16px;
        }
        .apps-scroller::-webkit-scrollbar { display: none; }

        .app-node {
            flex: 0 0 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* الأيقونات الدائرية المتجانسة مع السائل الخلفي */
        .app-img-container {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1e40af, #6d28d9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: white;
            margin-bottom: 8px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            transition: transform 0.1s ease;
        }
        .app-node:active .app-img-container {
            transform: scale(0.94);
        }

        .app-node:nth-child(2n) .app-img-container { background: linear-gradient(135deg, #db2777, #7c3aed); }
        .app-node:nth-child(3n) .app-img-container { background: linear-gradient(135deg, #d97706, #dc2626); }

        /* خط اسم التطبيق أصغر وبدقة عالية */
        .app-title-text {
            font-size: 12px;
            font-weight: 600;
            color: #ffffff;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 3px;
        }

        /* خط التقييم أصغر */
        .app-rate-box {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            gap: 2px;
            margin-bottom: 10px;
        }
        .app-rate-box i { color: #fbbf24; }

        /* أزرار التنزيل الزجاجية السائلة */
        .action-btn {
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.35);
            color: #60a5fa;
            width: 100%;
            padding: 8px 0;
            font-size: 12px;
            font-weight: 700;
            border-radius: 16px;
            text-decoration: none;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            display: block;
            transition: all 0.2s ease;
        }
        .action-btn:active {
            background: #2563eb;
            color: #ffffff;
            transform: scale(0.92);
        }

        /* التاب بار السفلي بتأثير عزل الزجاج البلوري الكامل */
        .tab-bar {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            height: 68px;
            background: rgba(5, 7, 15, 0.5);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 12px 30px rgba(0,0,0,0.5);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* خطوط شريط التصفح السفلي أصغر */
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: rgba(255, 255, 255, 0.35);
            text-decoration: none;
            font-size: 11px;
            font-weight: 600;
            flex: 1;
            height: 100%;
            justify-content: center;
        }

        .tab-item i {
            font-size: 19px;
            margin-bottom: 4px;
        }

        .tab-item.active {
            color: #3b82f6;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="top-icon" onclick="alert('البحث قادم قريباً!')"><i class="fas fa-search"></i></div>
        <div class="logo">IPA</div>
        <div class="top-icon" onclick="location.reload()"><i class="fas fa-redo-alt"></i></div>
    </div>

    <div class="categories-wrapper">
        <div class="category-item active" onclick="selectCategory(this)">
            <div class="category-icon-circle"><i class="fas fa-th-large"></i></div>
            <div class="category-name">الكل</div>
        </div>
        <div class="category-item" onclick="selectCategory(this)">
            <div class="category-icon-circle"><i class="fas fa-users"></i></div>
            <div class="category-name">تواصل</div>
        </div>
        <div class="category-item" onclick="selectCategory(this)">
            <div class="category-icon-circle"><i class="fas fa-film"></i></div>
            <div class="category-name">أفلام</div>
        </div>
        <div class="category-item" onclick="selectCategory(this)">
            <div class="category-icon-circle"><i class="fas fa-gamepad"></i></div>
            <div class="category-name">الألعاب</div>
        </div>
    </div>

    <div class="section-container">
        <div class="section-header">تواصل اجتماعي</div>
        <div class="apps-scroller">
            
            <div class="app-node">
                <div class="app-img-container"><i class="fab fa-whatsapp"></i></div>
                <div class="app-title-text">WhatsApp</div>
                <div class="app-rate-box"><i class="fas fa-star"></i> 4.4</div>
                <button class="action-btn" onclick="startDownload('WhatsApp')">تنزيل</button>
            </div>

            <div class="app-node">
                <div class="app-img-container"><i class="fab fa-telegram-plane"></i></div>
                <div class="app-title-text">Beegram</div>
                <div class="app-rate-box"><i class="fas fa-star"></i> 4.9</div>
                <button class="action-btn" onclick="startDownload('Beegram')">تنزيل</button>
            </div>

            <div class="app-node">
                <div class="app-img-container"><i class="fab fa-snapchat"></i></div>
                <div class="app-title-text">Snapchat</div>
                <div class="app-rate-box"><i class="fas fa-star"></i> 4.0</div>
                <button class="action-btn" onclick="startDownload('Snapchat')">تنزيل</button>
            </div>

        </div>
    </div>

    <div class="section-container">
        <div class="section-header">أفلام ومسلسلات</div>
        <div class="apps-scroller">

            <div class="app-node">
                <div class="app-img-container"><i class="fas fa-tv"></i></div>
                <div class="app-title-text">Anime Cloud</div>
                <div class="app-rate-box"><i class="fas fa-star"></i> 4.4</div>
                <button class="action-btn" onclick="startDownload('Anime Cloud')">تنزيل</button>
            </div>

            <div class="app-node">
                <div class="app-img-container"><i class="fas fa-play-circle"></i></div>
                <div class="app-title-text">Bawa</div>
                <div class="app-rate-box"><i class="fas fa-star"></i> 4.0</div>
                <button class="action-btn" onclick="startDownload('Bawa')">تنزيل</button>
            </div>

            <div class="app-node">
                <div class="app-img-container"><i class="fas fa-film"></i></div>
                <div class="app-title-text">HiTV</div>
                <div class="app-rate-box"><i class="fas fa-star"></i> 4.3</div>
                <button class="action-btn" onclick="startDownload('HiTV')">تنزيل</button>
            </div>

        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" onclick="setActiveTab(this)">
            <i class="fas fa-home"></i>
            <span>الرئيسية</span>
        </div>
        <div class="tab-item" onclick="setActiveTab(this)">
            <i class="fas fa-cubes"></i>
            <span>التطبيقات</span>
        </div>
        <div class="tab-item" onclick="setActiveTab(this)">
            <i class="fas fa-file-signature"></i>
            <span>التوقيع</span>
        </div>
        <div class="tab-item" onclick="setActiveTab(this)">
            <i class="fas fa-download"></i>
            <span>التنزيلات</span>
        </div>
        <div class="tab-item" onclick="setActiveTab(this)">
            <i class="fas fa-cog"></i>
            <span>الإعدادات</span>
        </div>
    </div>

    <script>
        function selectCategory(element) {
            document.querySelectorAll('.category-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
        }

        function setActiveTab(element) {
            document.querySelectorAll('.tab-bar .tab-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
        }

        function startDownload(appName) {
            alert('جاري التوقيع والتثبيت لـ: ' + appName);
        }
    </script>
</body>
</html>
