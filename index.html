<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر تطبيقات IPA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #050b1d; color: white; }
        
        /* تأثير الزجاج السائل */
        .glass-liquid {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* تصميم زر القائمة السفلي المختار */
        .active-tab {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

    <header class="p-6 flex justify-between items-center">
        <div class="w-12 h-12 rounded-2xl bg-gray-800 flex items-center justify-center border border-gray-600">
            <span class="font-bold text-xl">Z</span>
        </div>
        <div class="glass-liquid px-6 py-2 rounded-full font-bold">Zsign</div>
    </header>

    <section class="grid grid-cols-4 gap-4 px-6 text-center text-xs">
        <div class="flex flex-col items-center gap-2"><div class="w-14 h-14 glass-liquid rounded-full flex items-center justify-center text-xl"><i class="fa-solid fa-gamepad"></i></div>الألعاب</div>
        <div class="flex flex-col items-center gap-2"><div class="w-14 h-14 glass-liquid rounded-full flex items-center justify-center text-xl"><i class="fa-solid fa-tv"></i></div>أفلام</div>
        <div class="flex flex-col items-center gap-2"><div class="w-14 h-14 glass-liquid rounded-full flex items-center justify-center text-xl"><i class="fa-solid fa-users"></i></div>تواصل</div>
        <div class="flex flex-col items-center gap-2"><div class="w-14 h-14 glass-liquid rounded-full flex items-center justify-center text-xl"><i class="fa-solid fa-th"></i></div>الكل</div>
    </section>

    <section class="px-6 mt-8">
        <h2 class="font-bold mb-4">تواصل اجتماعي</h2>
        <div class="flex gap-4 overflow-x-auto no-scrollbar">
            <div class="glass-liquid min-w-[120px] rounded-[30px] p-4 flex flex-col items-center gap-2">
                <div class="w-16 h-16 rounded-2xl bg-gradient-to-tr from-purple-500 to-pink-500"></div>
                <p class="font-bold">Regram</p>
                <button class="bg-white/10 w-full rounded-full py-1 text-xs">تنزيل</button>
            </div>
            <div class="glass-liquid min-w-[120px] rounded-[30px] p-4 flex flex-col items-center gap-2">
                <div class="w-16 h-16 rounded-2xl bg-green-500"></div>
                <p class="font-bold">WhatsApp</p>
                <button class="bg-white/10 w-full rounded-full py-1 text-xs">تنزيل</button>
            </div>
        </div>
    </section>

    <nav class="fixed bottom-4 left-4 right-4 glass-liquid rounded-[30px] p-2 flex justify-between items-center px-4">
        <div class="flex flex-col items-center text-xs text-gray-400 p-2"><i class="fa-solid fa-gear text-lg"></i>الإعدادات</div>
        <div class="flex flex-col items-center text-xs text-gray-400 p-2"><i class="fa-solid fa-arrow-down text-lg"></i>التنزيلات</div>
        <div class="flex flex-col items-center text-xs text-gray-400 p-2"><i class="fa-solid fa-pen text-lg"></i>التوقيع</div>
        <div class="flex flex-col items-center text-xs text-gray-400 p-2"><i class="fa-solid fa-layer-group text-lg"></i>التطبيقات</div>
        <div class="flex flex-col items-center text-xs p-2 active-tab rounded-[20px]"><i class="fa-solid fa-home text-lg"></i>الرئيسية</div>
    </nav>

</body>
</html>
