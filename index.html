<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IPA Store</title>

<style>

body{
margin:0;
background:#0d0d0d;
font-family:sans-serif;
color:white;
text-align:center;
}

.header{
padding:60px 20px;
}

h1{
font-size:40px;
margin-bottom:10px;
}

p{
color:#aaa;
}

.apps{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
padding:20px;
}

.card{
background:#1a1a1a;
padding:20px;
width:250px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.card img{
width:90px;
border-radius:20px;
}

.card h2{
margin-top:15px;
}

.btn{
display:inline-block;
margin-top:15px;
padding:12px 25px;
background:#007aff;
color:white;
text-decoration:none;
border-radius:15px;
font-size:16px;
}

.footer{
margin-top:50px;
padding:20px;
color:#666;
font-size:14px;
}

</style>
</head>

<body>

<div class="header">
<h1>🔥 My IPA Store</h1>
<p>Best iOS Apps & Tweaks</p>
</div>

<div class="apps">

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png">

<h2>Instagram</h2>

<a class="btn" href="#">
Download IPA
</a>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg">

<h2>Telegram</h2>

<a class="btn" href="#">
Download IPA
</a>
</div>

</div>

<div class="footer">
Made By Mehdi
</div>

</body>
</html>
