<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: #05050d; /* خلفية الصفحة الغامقة */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* البطاقة المطلوبة (البانر) */
        .install-banner {
            width: 100%;
            max-width: 380px; /* متناسق مع شاشات الهواتف */
            background: linear-gradient(135deg, #101633 0%, #0a0d24 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 24px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        /* قسم النصوص */
        .banner-text {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
        }

        .banner-title {
            color: #ffffff;
            font-size: 17px;
            font-weight: 700;
        }

        .banner-description {
            color: #798299;
            font-size: 12px;
            line-height: 1.6;
            font-weight: 400;
        }

        /* قسم شعار آبل */
        .banner-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.25); /* لون رمادي خفيف للشعار مثل الصورة */
            padding-left: 5px;
        }
    </style>
</head>
<body>

    <div class="install-banner">
        
        <div class="banner-text">
            <h2 class="banner-title">تثبيت مباشر بدون كمبيوتر</h2>
            <p class="banner-description">اضغط تثبيت وانتظر ظهور التطبيق على شاشة الآيفون الرئيسية.</p>
        </div>

        <div class="banner-logo">

    </body>
</html>
