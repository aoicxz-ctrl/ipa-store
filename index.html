<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيقات IPA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #04060a; }
        .liquid-glass {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="text-white min-h-screen flex justify-center items-center p-4">

    <div class="w-full max-w-md bg-[#060911] rounded-[45px] border border-gray-900 overflow-hidden relative pb-28">
        
        <div class="p-6 pb-2 text-center">
            <h1 class="text-base font-bold text-white">تطبيقات IPA</h1>
        </div>

        <div id="apps-container" class="px-6 space-y-3 mt-6">
            </div>

        <div id="download-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md z-50 flex justify-center items-center p-6">
            <div class="liquid-glass w-full max-w-sm rounded-[30px] p-6 text-center border border-white/10">
                <button onclick="closeModal()" class="mb-4 text-gray-400"><i class="fas fa-times"></i></button>
                <div id="modal-icon-container" class="text-5xl mb-4"></div>
                <h3 id="modal-title" class="text-lg font-bold mb-2"></h3>
                <p id="modal-desc" class="text-xs text-gray-400 mb-6"></p>
                <a id="modal-download-link" href="#" class="block w-full bg-blue-600 text-white py-3 rounded-xl font-bold">تثبيت</a>
            </div>
        </div>
    </div>

    <script>
        const database = [
            { id: 1, name: "Reddit", version: "v2026.19", icon: "fab fa-reddit", desc: "تطبيق ريديت معدل.", url: "#" },
            { id: 2, name: "Messenger", version: "v562.0", icon: "fab fa-facebook-messenger", desc: "نسخة بلس.", url: "#" },
            { id: 3, name: "WPS Office", version: "v26.4", icon: "fas fa-file-pdf", desc: "الحزمة المكتبية الاحترافية.", url: "#" },
            { id: 4, name: "PUBG Mobile", version: "v3.2", icon: "fas fa-gamepad", desc: "نسخة ببجي المعدلة.", url: "#" },
            { id: 5, name: "CapCut", version: "v12.1", icon: "fas fa-video", desc: "برنامج المونتاج الاحترافي.", url: "#" }
        ];

        window.onload = function() {
            const container = document.getElementById('apps-container');
            database.forEach(app => {
                const card = document.createElement('div');
                card.className = "liquid-glass rounded-2xl p-3 flex justify-between items-center";
                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="text-3xl text-white/90 w-10 text-center"><i class="${app.icon}"></i></div>
                        <div>
                            <h4 class="text-sm font-bold">${app.name}</h4>
                            <p class="text-[10px] text-gray-400">${app.version}</p>
                        </div>
                    </div>
                    <button onclick="openModal(${app.id})" class="text-blue-400 text-xs font-bold px-4 py-2">تنزيل</button>
                `;
                container.appendChild(card);
            });
        };

        function openModal(id) {
            const app = database.find(a => a.id === id);
            document.getElementById('modal-title').innerText = app.name;
            document.getElementById('modal-desc').innerText = app.desc;
            document.getElementById('modal-icon-container').innerHTML = `<i class="${app.icon} text-white"></i>`;
            document.getElementById('download-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('download-modal').classList.add('hidden'); }
    </script>
</body>
</html>
