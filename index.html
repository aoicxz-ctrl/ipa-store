<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZSign Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(30px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: #090c15;
            background-image: 
                radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.35) 0px, transparent 60%),
                radial-gradient(at 100% 100%, rgba(124, 58, 237, 0.3) 0px, transparent 60%);
            background-attachment: fixed;
            color: #ffffff;
            padding-top: 85px; /* مسافة للهيدر العلوي */
            padding-bottom: 120px; /* مسافة للتاب بار السفلي الكبيير */
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        /* هيدر علوي متناسق وضخم المنافذ */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(9, 12, 21, 0.5);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            z-index: 1000;
        }

        .header .logo {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 0.5px;
            background: linear-gradient(to left, #fff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header .top-icon {
            width: 44px;
            height: 44px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            cursor: pointer;
        }

        /* تصنيفات علوية دائرية بحجم ممتاز للضغط */
        .categories-wrapper {
            overflow-x: auto;
            white-space: nowrap;
            padding: 10px 20px;
            margin-bottom: 25px;
        }
        .categories-wrapper::-webkit-scrollbar { display: none; }

        .category-item {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            margin-left: 22px;
            cursor: pointer;
        }

        .category-icon-circle {
            width: 68px;
            height: 68px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #ffffff;
            margin-bottom: 8px;
            transition: all 0.2s ease;
        }

        .category-item:active .category-icon-circle,
        .category-item.active .category-icon-circle {
            background: #ffffff;
            color: #090c15;
            transform: scale(0.95);
        }

        .category-name {
            font-size: 12px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
        }
        .category-item.active .category-name {
            color: #ffffff;
        }

        /* أقسام المحتوى */
        .section-container {
            margin-bottom: 35px;
        }

        .section-header {
            font-size: 22px;
            font-weight: 800;
            padding: 0 24px;
            margin-bottom: 18px;
            color: #ffffff;
        }

        /* سكرول أفقي للتطبيقات */
        .apps-scroller {
            display: flex;
            overflow-x: auto;
            padding: 5px 24px 20px 24px;
            gap: 20px;
        }
        .apps-scroller::-webkit-scrollbar { display: none; }

        /* كارت التطبيق - أبعاد أكبر ومريحة للعين */
        .app-node {
            flex: 0 0 115px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* الأيقونة مطابقة لحجم الفيديو تماماً */
        .app-img-container {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: white;
            margin-bottom: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            transition: transform 0.1s ease;
        }
        .app-node:active .app-img-container {
            transform: scale(0.93);
        }

        .app-node:nth-child(2n) .app-img-container { background: linear-gradient(135deg, #ec4899, #8b5cf6); }
        .app-node:nth-child(3n) .app-img-container { background: linear-gradient(135deg, #f59e0b, #e11d48); }

        .app-title-text {
            font-size: 14px;
            font-weight: 700;
            color: #ffffff;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .app-rate-box {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            gap: 3px;
            margin-bottom: 12px;
        }
        .app-rate-box i { color: #f59e0b; }

        /* زر التنزيل - عريض وكبير جداً ومناسب للمس والضغط الفوري */
        .action-btn {
            background: rgba(37, 99, 235, 0.2);
            border: 1px solid rgba(59, 130, 246, 0.5);
            color: #60a5fa;
            width: 100%;
            padding: 10px 0;
            font-size: 14px;
            font-weight: 800;
            border-radius: 20px;
            text-decoration: none;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            display: block;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .action-btn:transparent { background: rgba(37, 99, 235, 0.4); }
        .action-btn:active {
            background: #2563eb;
            color: #ffffff;
            transform: scale(0.9);
        }

        /* القائمة السفلية الزجاجية الكبيرة المتطابقة مع التطبيقات الرسمية */
        .tab-bar {
            position: fixed;
            bottom: 25px;
            left: 20px;
            right: 20px;
            height: 75px;
            background: rgba(9, 12, 21, 0.6);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            padding-bottom: env(safe-area-inset-bottom); /* حماية شريط الايفون السفلي السحب */
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
            flex: 1;
            height: 100%;
            justify-content: center;
        }

        .tab-item i {
            font-size: 22px;
            margin-bottom: 5px;
        }

        .tab-item:active {
            transform: scale(0.9);
        }

        .tab-item.active {
            color: #3b82f6;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="top-icon" onclick="alert('البحث قادم قريباً!')"><i class="fas fa-search"></i></div>
        <div class="logo">ZSign</div>
        <div class="top-icon" onclick="location.reload()"><i class="fas fa-redo-alt"></i></div>
    </div>

    <div class="categories-wrapper">
        <div class="category-item active" onclick="selectCategory(this)">
            <div class="category-icon-circle"><i class="fas fa-th-large"></i></div>
            <div class="category-name">الكل</div>
        </div>
        <div class="category-item" onclick="selectCategory(this)">
            <div class="category-icon-circle"><i class="fas fa-users"></i></div>
            <div class="category-name">تواصل</div>
        </div>
        <div class="category-item" onclick="selectCategory(this)">
            <div class="category-icon-circle"><i class="fas fa-film"></i></div>
            <div class="category-name">أفلام</div>
        </div>
        <div class="category-item" onclick="selectCategory(this)">
            <div class="category-icon-circle"><i class="fas fa-gamepad"></i></div>
            <div class="category-name">الألعاب</div>
        </div>
        <div class="category-item" onclick="selectCategory(this)">
            <div class="category-icon-circle"><i class="fas fa-paint-brush"></i></div>
            <div class="category-name">التصميم</div>
        </div>
    </div>

    <div class="section-container">
        <div class="section-header">تواصل اجتماعي</div>
        <div class="apps-scroller">
            
            <div class="app-node">
                <div class="app-img-container"><i class="fab fa-whatsapp"></i></div>
                <div class="app-title-text">WhatsApp</div>
                <div class="app-rate-box"><i class="fas fa-star"></i> 4.4</div>
                <button class="action-btn" onclick="startDownload('WhatsApp')">تنزيل</button>
            </div>

            <div class="app-node">
                <div class="app-img-container"><i class="fab fa-telegram-plane"></i></div>
                <div class="app-title-text">Beegram</div>
                <div class="app-rate-box"><i class="fas fa-star"></i> 4.9</div>
                <button class="action-btn" onclick="startDownload('Beegram')">تنزيل</button>
            </div>

            <div class="app-node">
                <div class="app-img-container"><i class="fab fa-snapchat"></i></div>
                <div class="app-title-text">Snapchat</div>
                <div class="app-rate-box"><i class="fas fa-star"></i> 4.0</div>
                <button class="action-btn" onclick="startDownload('Snapchat')">تنزيل</button>
            </div>

        </div>
    </div>

    <div class="section-container">
        <div class="section-header">أفلام ومسلسلات</div>
        <div class="apps-scroller">

            <div class="app-node">
                <div class="app-img-container"><i class="fas fa-tv"></i></div>
                <div class="app-title-text">Anime Cloud</div>
                <div class="app-rate-box"><i class="fas fa-star"></i> 4.4</div>
                <button class="action-btn" onclick="startDownload('Anime Cloud')">تنزيل</button>
            </div>

            <div class="app-node">
                <div class="app-img-container"><i class="fas fa-play-circle"></i></div>
                <div class="app-title-text">Bawa</div>
                <div class="app-rate-box"><i class="fas fa-star"></i> 4.0</div>
                <button class="action-btn" onclick="startDownload('Bawa')">تنزيل</button>
            </div>

            <div class="app-node">
                <div class="app-img-container"><i class="fas fa-film"></i></div>
                <div class="app-title-text">HiTV</div>
                <div class="app-rate-box"><i class="fas fa-star"></i> 4.3</div>
                <button class="action-btn" onclick="startDownload('HiTV')">تنزيل</button>
            </div>

        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" onclick="setActiveTab(this)">
            <i class="fas fa-home"></i>
            <span>الرئيسية</span>
        </div>
        <div class="tab-item" onclick="setActiveTab(this)">
            <i class="fas fa-cubes"></i>
            <span>التطبيقات</span>
        </div>
        <div class="tab-item" onclick="setActiveTab(this)">
            <i class="fas fa-file-signature"></i>
            <span>التوقيع</span>
        </div>
        <div class="tab-item" onclick="setActiveTab(this)">
            <i class="fas fa-download"></i>
            <span>التنزيلات</span>
        </div>
        <div class="tab-item" onclick="setActiveTab(this)">
            <i class="fas fa-cog"></i>
            <span>الإعدادات</span>
        </div>
    </div>

    <script>
        function selectCategory(element) {
            document.querySelectorAll('.category-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
        }

        function setActiveTab(element) {
            document.querySelectorAll('.tab-bar .tab-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
        }

        function startDownload(appName) {
            alert('جاري بدء عملية التوقيع والتنزيل لتطبيق: ' + appName);
            // هنا يمكنك مستقبلاً وضع كود التثبيت المباشر itms-services
        }
    </script>
</body>
</html>
