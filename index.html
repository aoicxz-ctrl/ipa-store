<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ستور التطبيقات</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#000;
color:white;
padding:20px;
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:35px;
}

.glass-btn{
width:110px;
height:55px;
border-radius:30px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.08);
display:flex;
align-items:center;
justify-content:space-around;
font-size:24px;
}

.title{
font-size:42px;
font-weight:bold;
margin-bottom:20px;
}

.banner{
width:100%;
height:220px;
border-radius:30px;
background:linear-gradient(135deg,#001c5c,#001018,#002b4e);
padding:30px;
position:relative;
overflow:hidden;
margin-bottom:30px;
border:1px solid rgba(255,255,255,0.08);
}

.banner h2{
font-size:36px;
margin-bottom:10px;
}

.banner p{
font-size:22px;
opacity:.8;
margin-bottom:20px;
}

.banner button{
padding:14px 28px;
border:none;
border-radius:20px;
background:rgba(255,255,255,0.15);
color:white;
font-size:20px;
backdrop-filter:blur(20px);
}

.apps-title{
font-size:40px;
font-weight:bold;
margin:30px 0;
}

.app-card{
display:flex;
align-items:center;
justify-content:space-between;
padding:18px 0;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.app-left{
display:flex;
align-items:center;
gap:15px;
}

.app-icon{
width:75px;
height:75px;
border-radius:18px;
object-fit:cover;
}

.app-info h3{
font-size:28px;
margin-bottom:6px;
}

.app-info p{
font-size:18px;
opacity:.6;
}

.download{
padding:10px 26px;
border:none;
border-radius:18px;
background:rgba(255,255,255,0.08);
color:#0A84FF;
font-size:22px;
backdrop-filter:blur(20px);
}

.bottom-nav{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:90%;
height:85px;
border-radius:35px;
background:rgba(30,30,30,0.85);
backdrop-filter:blur(20px);
display:flex;
justify-content:space-around;
align-items:center;
border:1px solid rgba(255,255,255,0.08);
}

.nav-item{
text-align:center;
font-size:18px;
opacity:.7;
}

.active{
opacity:1;
color:#0A84FF;
}

</style>
</head>

<body>

<div class="top-bar">

<div class="glass-btn">
⚙️ ⬜
</div>

</div>

<div class="title">
الرئيسية
</div>

<div class="banner">

<h2>
جديد الأخبار والتحديثات
</h2>

<p>
متابعة الأخبار الجديدة والتحديثات
</p>

<button>
اشترك في قناة التحديثات
</button>

</div>

<div class="apps-title">
محدث مؤخراً
</div>

<div class="app-card">

<button class="download">
تنزيل
</button>

<div class="app-left">

<div class="app-info">
<h3>iLovePDF</h3>
<p>التطبيق غني عن التعريف</p>
</div>

<img class="app-icon" src="https://upload.wikimedia.org/wikipedia/commons/8/87/PDF_file_icon.svg">

</div>

</div>

<div class="app-card">

<button class="download">
تنزيل
</button>

<div class="app-left">

<div class="app-info">
<h3>Telegram</h3>
<p>تطبيق مراسلة سريع</p>
</div>

<img class="app-icon" src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg">

</div>

</div>

<div class="app-card">

<button class="download">
تنزيل
</button>

<div class="app-left">

<div class="app-info">
<h3>YouTube</h3>
<p>مشاهدة الفيديوهات</p>
</div>

<img class="app-icon" src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg">

</div>

</div>

<div class="bottom-nav">

<div class="nav-item">
🌐<br>
المصادر
</div>

<div class="nav-item">
📦<br>
تطبيقات
</div>

<div class="nav-item active">
🏠<br>
الرئيسية
</div>

</div>

</body>
</html>
