<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيقات IPA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0a0e17; font-family: sans-serif; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .active-nav { background: rgba(255, 255, 255, 0.15); border-radius: 15px; }
        .hidden-page { display: none; }
    </style>
</head>
<body class="pb-20">

    <header class="p-6 flex justify-between items-center">
        <h1 class="text-xl font-bold">تطبيقات IPA</h1>
        <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center">Z</div>
    </header>

    <div class="mx-6 p-6 glass rounded-3xl mb-6">
        <h2 class="text-lg font-bold">تثبيت مباشر بدون كمبيوتر</h2>
        <p class="text-sm text-gray-400 mt-2">اضغط تثبيت وانتظر ظهور التطبيق على الشاشة الرئيسية.</p>
        <div class="mt-4 flex items-center justify-between">
            <i class="fab fa-apple text-3xl"></i>
            <span class="bg-green-900 text-green-400 px-3 py-1 rounded-full text-xs">● الشهادة شغالة</span>
        </div>
    </div>

    <main id="content">
        <div id="home" class="page">
            <div class="px-6 grid grid-cols-2 gap-4">
                <div class="glass p-4 rounded-2xl flex items-center justify-between">
                    <span>TikTok Plus</span>
                    <button class="bg-white/10 px-3 py-1 rounded-lg text-xs">تثبيت</button>
                </div>
            </div>
        </div>
        <div id="apps" class="page hidden-page px-6"><h2 class="text-center">صفحة التطبيقات</h2></div>
        <div id="sign" class="page hidden-page px-6"><h2 class="text-center">صفحة التوقيع</h2></div>
        <div id="settings" class="page hidden-page px-6"><h2 class="text-center">صفحة الإعدادات</h2></div>
    </main>

    <nav class="fixed bottom-4 left-4 right-4 glass rounded-3xl p-2 flex justify-around items-center">
        <button onclick="showPage('settings')" class="flex flex-col items-center p-2"><i class="fas fa-cog"></i></button>
        <button onclick="showPage('sign')" class="flex flex-col items-center p-2"><i class="fas fa-pen"></i></button>
        <button onclick="showPage('apps')" class="flex flex-col items-center p-2"><i class="fas fa-box"></i></button>
        <button onclick="showPage('home')" class="flex flex-col items-center p-2 active-nav"><i class="fas fa-home"></i></button>
    </nav>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden-page'));
            document.getElementById(pageId).classList.remove('hidden-page');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
            event.currentTarget.classList.add('active-nav');
        }
    </script>
</body>
</html>
